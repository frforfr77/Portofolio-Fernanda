<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portofolio Fernanda Saputra - Front-End Developer muda Indonesia."
    />
    <title>Fernanda Saputra | Portofolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header id="main-header">
      <nav id="main-nav">
        <button class="menu-toggle" aria-label="Buka navigasi">
          <i data-lucide="menu"></i>
          <span>Menu</span>
        </button>

        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main>
      <section id="profile-section" class="content-section">
        <div class="profile">
          <img
            src="Fernanda.png"
            alt="Foto profil Fernanda Saputra"
            class="profile-image"
          />
          <h3 class="profile-name">Fernanda Saputra</h3>
        </div>

        <div class="infoProfile">
          <p class="profile-bio">Remaja 18 Tahun dengan keahlian sederhana.</p>
          <p class="contact-prompt">
            Social Media?
            <a href="contact.html" class="contact-link">Di sini!</a>
          </p>
        </div>
      </section>

      <div class="channel">
        <h2>Channel</h2>
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/UDnooha7viw?si=dACckprelN6J7yKi"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </div>
      <div class="project">
        <h2>Project</h2>
        <iframe
          src="https://frforfr77.github.io/PortofolioPage/"
          frameborder="0"
        ></iframe>
      </div>
    </main>

    <!-- FOOTER -->
    <footer id="main-footer">
      <div class="social-links">
        <a href="https://www.instagram.com/frnndasptr/" target="_blank"
          ><i data-lucide="instagram"></i
        ></a>
        <a href="https://github.com/frforfr77" target="_blank"
          ><i data-lucide="github"></i
        ></a>
        <a href="https://www.x.com/fforferr/" target="_blank"
          ><i data-lucide="twitter"></i
        ></a>
      </div>
      <p class="copyright-text">
        © 2025 Fernanda Saputra. All Rights Reserved.
      </p>
    </footer>

    <!-- SCRIPT -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="script.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
